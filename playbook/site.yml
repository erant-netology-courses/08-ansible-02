---
- name: Install Clickhouse
  hosts: clickhouse
  handlers:
    - name: Start clickhouse service
      become: true
      ansible.builtin.service:
        name: clickhouse-server
        state: restarted
  tasks:
    # - block:
    #     - name: Get clickhouse distrib
    #       ansible.builtin.get_url:
    #         url: "https://packages.clickhouse.com/rpm/stable/{{ item }}-{{ clickhouse_version }}.noarch.rpm"
    #         dest: "./{{ item }}-{{ clickhouse_version }}.rpm"
    #       with_items: "{{ clickhouse_packages }}"
    #   rescue:
    #     - name: Get clickhouse distrib
    #       ansible.builtin.get_url:
    #         url: "https://packages.clickhouse.com/rpm/stable/clickhouse-common-static-{{ clickhouse_version }}.x86_64.rpm"
    #         dest: "./clickhouse-common-static-{{ clickhouse_version }}.rpm"
    - block:
        - name: Get clickhouse distrib
          ansible.builtin.get_url:
            url: "https://packages.clickhouse.com/deb/pool/main/c/clickhouse/{{ item }}_{{ clickhouse_version }}_all.deb"
            dest: "./{{ item }}_{{ clickhouse_version }}.deb"
          with_items: "{{ clickhouse_packages }}"
      rescue:
        - name: Get clickhouse distrib (fallback for amd64)
          ansible.builtin.get_url:
            url: "https://packages.clickhouse.com/deb/pool/main/c/clickhouse/clickhouse-common-static_{{ clickhouse_version }}_amd64.deb"
            dest: "./clickhouse-common-static_{{ clickhouse_version }}.deb"

    - name: Install clickhouse packages
      become: true
      ansible.builtin.apt:
        deb:
          - ./clickhouse-common-static_{{ clickhouse_version }}.deb
          - ./clickhouse-client_{{ clickhouse_version }}.deb
          - ./clickhouse-server_{{ clickhouse_version }}.deb
      notify: Start clickhouse service
    - name: Flush handlers
      meta: flush_handlers
    - name: Create database
      ansible.builtin.command: "clickhouse-client -q 'create database logs;'"
      register: create_db
      failed_when: create_db.rc != 0 and create_db.rc !=82
      changed_when: create_db.rc == 0
